services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: linktree_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    networks:
      - edge
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: linktree_frontend
    depends_on:
      - backend
    networks:
      - apps
    restart: unless-stopped

networks:
  edge:
    external: true
  apps:
    external: true