version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: linktree_db
    environment:
      POSTGRES_USER: linktree
      POSTGRES_PASSWORD: linktree_secret
      POSTGRES_DB: linktree
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linktree_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: linktree_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://linktree:linktree_secret@db:5432/linktree
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      - db
    networks:
      - linktree_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: linktree_frontend
    depends_on:
      - backend
    networks:
      - linktree_network
    restart: unless-stopped

networks:
  linktree_network:
    driver: bridge

volumes:
  postgres_data: